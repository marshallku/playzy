name: backend CI

on:
  pull_request:
    paths:
      - "backend/**"
      - ".github/workflows/ci-backend.yml"
  push:
    branches: [master]
    paths:
      - "backend/**"
      - ".github/workflows/ci-backend.yml"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    # A throwaway Postgres so the durable prod store (PLAYZY_QUOTA_STORE=postgres) is
    # actually exercised in CI — otherwise its tests skip and it never runs pre-merge.
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: test
          POSTGRES_DB: playzy
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true
          cache-dependency-path: backend/go.sum

      - name: Vet
        run: go vet ./...

      - name: Build
        run: go build -o /tmp/playzy-backend .

      - name: Test
        env:
          PLAYZY_TEST_DATABASE_URL: postgres://postgres:test@localhost:5432/playzy?sslmode=disable
        run: go test ./... -race
