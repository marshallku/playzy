name: playzy
description: "Playzy — personalized bedtime stories for infants and toddlers."
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  # State management + DI (ADR 0004)
  flutter_riverpod: ^2.5.1
  # Declarative, deep-link-ready routing (ADR 0004)
  go_router: ^14.2.0
  # Local child-profile persistence
  shared_preferences: ^2.2.3
  # HTTP client for the Playzy backend (ADR 0001)
  http: ^1.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  fonts:
    # Pretendard (OFL-1.1) — bundled UI + Korean story body font (DESIGN.md §3).
    # Variable font: weights are applied via fontWeight at runtime.
    - family: Pretendard
      fonts:
        - asset: assets/fonts/PretendardVariable.ttf
  # NOTE: Gmarket Sans (display/brand font in DESIGN.md §3.1) is NOT bundled —
  # its license needs review before redistribution. Display text falls back to
  # Pretendard until the licensed asset is dropped in (docs/planning/90 — fonts).
