name: playzy
description: "Playzy — personalized bedtime stories for infants and toddlers."
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  # State management + DI (ADR 0004)
  flutter_riverpod: ^2.5.1
  # Declarative, deep-link-ready routing (ADR 0004)
  go_router: ^14.2.0
  # Local child-profile persistence
  shared_preferences: ^2.2.3
  # HTTP client for the Playzy backend (ADR 0001)
  http: ^1.2.1
  # Apple IAP via RevenueCat — consumable credit packs (ADR 0002 / D1). iOS only;
  # activated at runtime behind PLAYZY_REVENUECAT_IOS_KEY + a real backend.
  purchases_flutter: ^8.0.0
  # Secure (Keychain-backed) storage for the app session token (WU5). Survives
  # reinstall on iOS, unlike shared_preferences.
  flutter_secure_storage: ^9.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  fonts:
    # Pretendard (OFL-1.1) — bundled UI + Korean display font (DESIGN.md §3).
    # Variable font: weights are applied via fontWeight at runtime.
    - family: Pretendard
      fonts:
        - asset: assets/fonts/PretendardVariable.ttf
    # Gowun Batang (OFL-1.1) — the warm Korean serif for story reading (§3.1).
    - family: GowunBatang
      fonts:
        - asset: assets/fonts/GowunBatang-Regular.ttf
        - asset: assets/fonts/GowunBatang-Bold.ttf
          weight: 700
    # Fredoka (OFL-1.1) — rounded Latin face for the "Playzy" wordmark ONLY.
    # Variable font (width+weight axes); weight applied via fontWeight.
    - family: Fredoka
      fonts:
        - asset: assets/fonts/Fredoka-Variable.ttf
  # All three families are OFL-1.1 (see assets/fonts/NOTICE.md). Gmarket Sans is
  # no longer planned — Fredoka (bundled) owns the brand wordmark (D8 resolved).
