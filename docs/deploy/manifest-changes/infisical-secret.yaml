apiVersion: secrets.infisical.com/v1alpha1
kind: InfisicalSecret
metadata:
  name: playzy-secret
  namespace: playzy
spec:
  resyncInterval: 60
  authentication:
    universalAuth:
      secretsScope:
        projectSlug: playzy-prd
        envSlug: prd
        secretsPath: "/"
      credentialsRef:
        secretName: infisical-universal-auth
        secretNamespace: playzy
  managedSecretReference:
    secretName: playzy-secret
    secretNamespace: playzy
    creationPolicy: Owner
